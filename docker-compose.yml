# Self-managed production stack for condo on a single Linux host (e.g. EC2).
#
# Bootstrap and redeploys go through bin/deploy.sh, which generates .env on
# first run with random POSTGRES_PASSWORD / COOKIE_SECRET / ADMIN_PASSWORD.
# See DEPLOY.md for the operator runbook.
#
# Ingress is Caddy on 80/443 with automatic Let's Encrypt SSL; all other
# services are reachable only on the internal docker network.

x-app-env: &app-env
  NODE_ENV: production
  PORT: "4006"
  SERVER_URL: https://${DOMAIN}
  COOKIE_SECRET: ${COOKIE_SECRET}
  DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/local-condo
  REDIS_URL: redis://redis:6379/1
  # Field-level encryption for the database. bin/prepare.js generates
  # equivalents into apps/condo/.env on init, but that file lives only in
  # the init container's filesystem — pass these explicitly so condo and
  # worker (separate containers) see them too.
  DATA_ENCRYPTION_VERSION_ID: ${DATA_ENCRYPTION_VERSION_ID}
  DATA_ENCRYPTION_CONFIG: ${DATA_ENCRYPTION_CONFIG}
  # packages/keystone/fileAdapter defaults to "sbercloud" (Sberbank S3)
  # when unset, which then crashes because we have no S3 creds. Force
  # local-disk uploads. Files are ephemeral (lost on container rebuild) —
  # configure S3 + FILE_FIELD_ADAPTER=s3 for any real production deploy.
  FILE_FIELD_ADAPTER: local
  # Stub the upstream address-service so the app doesn't try to call an
  # external Russian gov address API we don't run here.
  FAKE_ADDRESS_SERVICE_CLIENT: "true"

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    depends_on:
      condo:
        condition: service_started
    logging: *default-logging

  postgres:
    image: postgres:16.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    logging: *default-logging

  redis:
    image: redis:6.2
    restart: unless-stopped
    command: ["redis-server", "--databases", "64"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    logging: *default-logging

  # One-shot bootstrap: creates the per-app database, runs all migrations, and
  # seeds the admin user from ADMIN_EMAIL / ADMIN_PASSWORD. Runs to completion
  # on every `docker compose up` whenever the image hash changes (i.e. after a
  # rebuild), so new migrations apply automatically on each deploy.
  init:
    image: condo-monorepo:built
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    command: ["sh", "-c", "node bin/prepare -f condo && yarn workspace @app/condo migrate"]
    environment:
      <<: *app-env
      # bin/prepare.js defaults to 127.0.0.1; redirect it at the in-network
      # service names.
      LOCAL_PG_DB_PREFIX: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432
      LOCAL_REDIS_DB_PREFIX: redis://redis:6379
      DEFAULT_TEST_ADMIN_IDENTITY: ${ADMIN_EMAIL}
      DEFAULT_TEST_ADMIN_SECRET: ${ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging

  condo:
    image: condo-monorepo:built
    restart: unless-stopped
    command: ["yarn", "workspace", "@app/condo", "start"]
    expose:
      - "4006"
    environment: *app-env
    depends_on:
      init:
        condition: service_completed_successfully
    logging: *default-logging

  worker:
    image: condo-monorepo:built
    restart: unless-stopped
    command: ["yarn", "workspace", "@app/condo", "worker"]
    environment: *app-env
    depends_on:
      init:
        condition: service_completed_successfully
    logging: *default-logging

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
