# Self-managed production stack for condo on a single Linux host (e.g. EC2).
#
# Bootstrap and redeploys go through bin/deploy.sh, which generates .env on
# first run with random POSTGRES_PASSWORD / COOKIE_SECRET / ADMIN_PASSWORD.
# See DEPLOY.md for the operator runbook.
#
# Ingress is Caddy on 80/443 with automatic Let's Encrypt SSL; all other
# services are reachable only on the internal docker network.

x-app-env: &app-env
  NODE_ENV: production
  PORT: "4006"
  SERVER_URL: https://${DOMAIN}
  COOKIE_SECRET: ${COOKIE_SECRET}
  DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/local-condo
  REDIS_URL: redis://redis:6379/1
  # Field-level encryption for the database. The full JSON config is
  # templated here because docker-compose's .env parser silently strips
  # inner " characters from JSON values (even when single-quoted), so
  # putting DATA_ENCRYPTION_CONFIG directly in .env produces invalid JSON
  # at the container's process.env. Only the random secret comes from
  # .env (as a plain hex string with no " in it).
  DATA_ENCRYPTION_VERSION_ID: condo_1
  DATA_ENCRYPTION_CONFIG: '{"condo_1":{"algorithm":"aes-256-gcm","secret":"${DATA_ENCRYPTION_SECRET}","compressor":"brotli","keyDeriver":"pbkdf2-sha512"}}'
  # packages/keystone/fileAdapter defaults to "sbercloud" (Sberbank S3)
  # when unset, which then crashes because we have no S3 creds. Force
  # local-disk uploads. Files are ephemeral (lost on container rebuild) —
  # configure S3 + FILE_FIELD_ADAPTER=s3 for any real production deploy.
  FILE_FIELD_ADAPTER: local
  # Stub the upstream address-service so the app doesn't try to call an
  # external Russian gov address API we don't run here.
  FAKE_ADDRESS_SERVICE_CLIENT: "true"
  # SMS provider. Defaults to empty -> SMSAdapter falls back to sms.ru (which
  # has no creds and would fail) but it doesn't matter because the console
  # sink below short-circuits delivery. To enable Twilio, set in .env:
  #   SMS_PROVIDER=TWILIO
  #   TWILIO_ACCOUNT_SID=AC...
  #   TWILIO_AUTH_TOKEN=...
  #   TWILIO_FROM_NUMBER=+1XXXXXXXXXX
  #   NOTIFICATION_SEND_ALL_MESSAGES_TO_CONSOLE=false
  # Full adapter list: apps/condo/domains/notification/adapters/smsAdapter.js
  SMS_PROVIDER: ${SMS_PROVIDER:-}
  # JSON is templated here for the same reason DATA_ENCRYPTION_CONFIG is:
  # docker compose's .env parser strips inner " characters from JSON values.
  # The three TWILIO_* pieces come from .env as plain strings.
  TWILIO_API_CONFIG: '{"accountSid":"${TWILIO_ACCOUNT_SID:-}","authToken":"${TWILIO_AUTH_TOKEN:-}","fromNumber":"${TWILIO_FROM_NUMBER:-}","api_url":"https://api.twilio.com/2010-04-01/Accounts"}'
  # When true (the default), every outbound notification (SMS codes, email,
  # push, telegram) is logged to the worker's stdout instead of being sent.
  # Read the code with:
  #   docker compose logs --tail=50 worker | grep -E "smsAdapter|Message"
  # Set to "false" in .env once a real SMS / email provider is configured.
  NOTIFICATION__SEND_ALL_MESSAGES_TO_CONSOLE: ${NOTIFICATION_SEND_ALL_MESSAGES_TO_CONSOLE:-true}

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    depends_on:
      condo:
        condition: service_started
    logging: *default-logging

  postgres:
    image: postgres:16.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    logging: *default-logging

  redis:
    image: redis:6.2
    restart: unless-stopped
    command: ["redis-server", "--databases", "64"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    logging: *default-logging

  # One-shot bootstrap: creates the per-app database, runs all migrations, and
  # seeds (or updates) the admin user from ADMIN_EMAIL / ADMIN_PASSWORD. Runs
  # to completion on every `docker compose up` whenever the image hash changes
  # (i.e. after a rebuild), so new migrations apply automatically on each
  # deploy. create-user.js is idempotent — re-running updates the existing
  # admin's password rather than creating a duplicate.
  init:
    image: condo-monorepo:built
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    command:
      - sh
      - -c
      - |
        set -e
        node bin/prepare -f condo
        yarn workspace @app/condo migrate
        yarn workspace @app/condo node ./bin/create-user.js '${ADMIN_EMAIL}' '{"password":"${ADMIN_PASSWORD}","isAdmin":true,"name":"Admin"}'
    environment:
      <<: *app-env
      # bin/prepare.js defaults to 127.0.0.1; redirect it at the in-network
      # service names.
      LOCAL_PG_DB_PREFIX: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432
      LOCAL_REDIS_DB_PREFIX: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging

  condo:
    image: condo-monorepo:built
    restart: unless-stopped
    command: ["yarn", "workspace", "@app/condo", "start"]
    expose:
      - "4006"
    environment: *app-env
    depends_on:
      init:
        condition: service_completed_successfully
    logging: *default-logging

  worker:
    image: condo-monorepo:built
    restart: unless-stopped
    command: ["yarn", "workspace", "@app/condo", "worker"]
    environment: *app-env
    depends_on:
      init:
        condition: service_completed_successfully
    logging: *default-logging

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
